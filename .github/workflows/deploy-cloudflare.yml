# Deploy Next.js (OpenNext) lên Cloudflare Workers.
# Secrets cần tạo trong repo: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Miniflare khi deploy dùng `localConnectionString` trong wrangler.jsonc (đổi nếu cần).

name: Deploy Cloudflare Workers

on:
  workflow_dispatch: {}
  push:
    branches: [main]

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Deploy (OpenNext + Wrangler)
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
